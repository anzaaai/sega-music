  // ============================================================
  // Category label map
  // ============================================================
  const CAT_LABEL = {
    all: "ALL",
    arcade: "アーケード",
    consumer: "コンシューマー",
    pachinko: "ぱちんこ / パチスロ",
    sonic: "ソニック",
    sakura: "サクラ大戦",
    pso: "ファンタシースター",
    chunithm: "CHUNITHM",
    maimai: "maimai",
    readyyy: "Readyyy!",
    voice: "声優 / ドラマCD",
    shining: "シャイニング",
    tv: "TV・映画 etc."
  };

  // ============================================================
  // State
  // ============================================================
  let activeCat = "all";
  let activeYear = "all";

  // ============================================================
  // Render
  // ============================================================
  function getFilteredReleases() {
    return RELEASES.filter(r => {
      const catOk = activeCat === "all" || r.cat === activeCat;
      const year = r.date.split(".")[0];
      const yearOk = activeYear === "all" || year === activeYear;
      return catOk && yearOk;
    });
  }

  function getYears(cat) {
    const filtered = cat === "all" ? RELEASES : RELEASES.filter(r => r.cat === cat);
    const years = [...new Set(filtered.map(r => r.date.split(".")[0]))].sort((a, b) => b - a);
    return years;
  }

  function renderYearBar() {
    const bar = document.getElementById("yearBar");
    const years = getYears(activeCat);
    const filtered = getFilteredReleases();

    let html = `<button type="button" class="release-year-btn${activeYear === "all" ? " is-active" : ""}" data-year="all">ALL</button>`;
    years.forEach(y => {
      html += `<button type="button" class="release-year-btn${activeYear === y ? " is-active" : ""}" data-year="${y}">${y}</button>`;
    });
    bar.innerHTML = html;

    bar.querySelectorAll(".release-year-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        activeYear = btn.dataset.year;
        renderAll();
      });
    });
  }

  function cardHTML(r) {
    const hasLink = r.url && r.url.length > 0;
    const isExternal = hasLink && !r.local && r.url.startsWith("http");
    const target = isExternal ? ' target="_blank" rel="noopener noreferrer"' : "";
    const imgSrc = r.img || "";
    const inner = `
      <div class="release-card__img-wrap">
        <img src="${imgSrc}" alt="${r.title}" class="release-card__img" loading="lazy">
        ${hasLink ? `<div class="release-card__overlay"><span class="release-card__overlay-text">詳細を見る<svg width="10" height="10" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false"><path d="M1 9L9 1M9 1H3M9 1V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span></div>` : ""}
      </div>
      <div class="release-card__body">
        <span class="release-card__date">${r.date}</span>
        <p class="release-card__title">${r.title}</p>
      </div>`;
    if (hasLink) {
      return `<a href="${r.url}" class="release-card"${target}>${inner}</a>`;
    }
    return `<div class="release-card release-card--no-link">${inner}</div>`;
  }

  function renderCatalog() {
    const catalog = document.getElementById("releaseCatalog");
    const filtered = getFilteredReleases();

    if (filtered.length === 0) {
      catalog.innerHTML = `<p class="release-empty" style="display:block;text-align:center;padding:4vw 0;font-family:var(--font-body);font-size:0.86vw;color:var(--muted);">該当する作品がありません。</p>`;
      return;
    }

    // Group by year
    const groups = {};
    filtered.forEach(r => {
      const y = r.date.split(".")[0];
      if (!groups[y]) groups[y] = [];
      groups[y].push(r);
    });

    const years = Object.keys(groups).sort((a, b) => b - a);
    let html = "";
    years.forEach(year => {
      const items = groups[year];
      html += `<div class="release-year-group" data-year-group="${year}">
        <div class="release-year-group__label">${year}</div>
        <div class="release-grid">
          ${items.map(cardHTML).join("")}
        </div>
      </div>`;
    });

    catalog.innerHTML = html;

    // Staggered fadeUp on each card
    const cards = catalog.querySelectorAll(".release-card, .release-card--no-link");
    cards.forEach((card, i) => {
      card.style.opacity = "0";
      card.style.transform = "translateY(16px)";
      card.style.transition = "none";
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          card.style.transition = `opacity 0.45s cubic-bezier(0.16,1,0.3,1) ${Math.min(i * 18, 300)}ms, transform 0.45s cubic-bezier(0.16,1,0.3,1) ${Math.min(i * 18, 300)}ms`;
          card.style.opacity = "1";
          card.style.transform = "translateY(0)";
        });
      });
    });
  }

  function renderAll() {
    renderYearBar();
    renderCatalog();
  }

  // ============================================================
  // Category nav click
  // ============================================================
  document.querySelectorAll(".release-nav__btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".release-nav__btn").forEach(b => b.classList.remove("is-active"));
      btn.classList.add("is-active");
      activeCat = btn.dataset.cat;
      activeYear = "all";
      renderAll();
    });
  });

  // ============================================================
  // Init
  // ============================================================
  renderAll();

  // bfcache 復元時（戻るボタンなど）にカードが非表示のまま残るのを防ぐ
  window.addEventListener("pageshow", (e) => {
    if (e.persisted) {
      document.querySelectorAll(".release-card, .release-card--no-link").forEach(card => {
        card.style.transition = "none";
        card.style.opacity = "1";
        card.style.transform = "translateY(0)";
      });
    }
  });
  </script>
